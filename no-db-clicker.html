<!DOCTYPE html>
<html>

<head>
  <meta name="viewport" content="user-scalable=no" />
  <link rel="stylesheet" href="styles.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <title>Click counter</title>
</head>

<body>
  <div class="buttons-wrapper">
    <div class="btn btn-primary" id=counterButton>
      <span id="button-timer">2:30</span>
      <span id="button-number">0</span>
    </div>
    <div class="buttons-wrapper-bottom">
      <button id=resetButton>Press 3 times to reset counter</button>
      <div class="input-wrapper">
        <input type="number" id="timerInput" placeholder="Timer in seconds">
      </div>
    </div>
  </div>
</body>
<script src="scripts.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
<script type="module" src="firebase.js"></script>

</html>
