<!DOCTYPE html>
<html>

<head>
  <meta name="viewport" content="user-scalable=no" />
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="styles.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <title>Click counter</title>
</head>

<body>
  <div class="buttons-wrapper">
    <div class="btn btn-primary" id=counterButton>
      <span id="contestantName"></span>
      <span id="button-timer">2:30</span>
      <span id="button-number">0</span>
    </div>
    <button id=resetButton>Press 3 times to reset counter</button>
  </div>

  <div class="modal" tabindex="-1" id="scoreModal" data-bs-backdrop="static" data-bs-keyboard="false">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Submit Score</h5>
      </div>
      <div class="modal-body">

        <div>
          <label>Points</label>
          <input id="pointsInput" type="number" disabled>
        </div>
        <div>
          <label>Overall feel</label>
          <input id="feelInput" type="number">
        </div>
      </div>
      <div class="modal-footer">
        <button id="submitScoreBtn" class="btn btn-primary">
          Submit
        </button>
      </div>
    </div>
  </div>
</div>
</body>
<script type="module" src="js/judge.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
<script type="module" src="js/firebase.js"></script>

</html>
