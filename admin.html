<!DOCTYPE html>
<html>

<head>
    <meta name="viewport" content="user-scalable=no" />
    <link rel="stylesheet" href="styles.css">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <title>Click counter - admin</title>
</head>

<body>
    <div class="page-wrapper">
        <div class="alert alert-info" id="authMessage">Sign in with Google to access the admin panel.</div>

        <div class="d-flex gap-2 mb-3">
            <button id="googleLoginBtn" class="btn btn-primary">Sign in with Google</button>
            <button id="googleLogoutBtn" class="btn btn-outline-secondary">Sign out</button>
        </div>

        <div id="authStatus" class="text-muted mb-3">Checking Google sign-in...</div>

        <div id="adminContent" style="display:none;">
            <div class="timer-wrapper">
                <div>
                    <span>Timer duration - </span>
                    <span>2:30</span>
                </div>
                <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#timerModal">Change timer duration</button>
            </div>
            <div class="contestants-wrapper">
                <table  class="table table-striped table-bordered">
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Points</th>
                            <th>Overall feel</th>
                            <th></th>
                        </tr>
                    </thead>
                    <tbody id="contestantsTableBody">
                        <tr>
                            <td>MourEgg</td>
                            <td>
                                <div>
                                    <span>10</span>
                                    <span>12</span>
                                </div>
                            </td>
                            <td>
                                <div>
                                    <span>5</span>
                                    <span>4</span>
                                </div>
                            </td>
                            <td>
                                <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#editModal">Edit</button>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
            <form id="addContestantForm" class="add-contestant">
                <input type="text" class="form-control" id="contestantName" placeholder="Contestant name">
                <button class="btn btn-primary">Add contestant</button>
            </form>
            <div class="judges-wrapper" style="margin-top:18px">
                <h3>Judges</h3>
                <table class="table table-striped table-bordered">
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Invite link</th>
                            <th></th>
                        </tr>
                    </thead>
                    <tbody id="judgesTableBody">
                    </tbody>
                </table>

                <form id="addJudgeForm" class="add-judge add-contestant">
                    <input type="text" class="form-control" id="judgeNameInput" placeholder="Judge name">
                    <button class="btn btn-primary">Add judge</button>
                </form>
            </div>
            

            <h2>Results</h2>
            <table class="table table-striped table-bordered">
                <thead>
                    <tr>
                        <th>Position</th>
                        <th>Name</th>
                        <th>Average (0-100)</th>
                    </tr>
                </thead>
                <tbody id="resultsTableBody">
                </tbody>
            </table>
            <button class="event-reset btn btn-danger">Reset event</button>
        </div>
    </div>

    <!-- Modal -->
    <div class="modal fade" id="editModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h1 class="modal-title fs-5" id="exampleModalLabel">Edit Contestant</h1>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <div class="edit-row">
                        <span>Name</span>
                        <input type="text" class="form-control" id="editNameInput" placeholder="Contestant name" value="MourEgg">
                    </div>
                    <div class="mt-3">
                        <strong>Judge scores</strong>
                        <div id="editScoresContainer"></div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                    <button type="button" id="saveEditBtn" class="btn btn-primary">Save changes</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal -->
    <div class="modal fade" id="timerModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h1 class="modal-title fs-5" id="exampleModalLabel">Edit Timer</h1>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <div class="edit-row">
                        <span>Time in seconds</span>
                        <input id="timerDurationInput" type="number" class="form-control" placeholder="Time in seconds" value="150">
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                    <button type="button" id="saveTimerBtn" class="btn btn-primary">Save changes</button>
                </div>
            </div>
        </div>
    </div>
</body>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
    crossorigin="anonymous"></script>
<script type="module" src="js/admin-scripts.js"></script>
<script type="module" src="js/firebase.js"></script>

</html>
